<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSH 公钥管理</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔑</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- 认证页面 -->
    <div id="auth-page" class="page">
      <div class="card">
        <h1>🔐 SSH 公钥管理</h1>
        
        <!-- 登录 -->
        <div id="login-section">
          <h2>请输入验证码</h2>
          <p class="hint">打开您的认证器应用，输入 6 位数字验证码</p>
          <input type="text" id="token-input" placeholder="000000" maxlength="6" pattern="[0-9]*" inputmode="numeric">
          <button id="verify-btn" class="btn btn-primary">验证并登录</button>
          <div id="auth-error" class="error-message"></div>
          <div class="admin-entry">
            <button id="admin-entry-btn" class="btn-link">🔒 超管入口</button>
          </div>
        </div>

        <!-- 超管登录 -->
        <div id="admin-login-section" style="display:none;">
          <h2>🛡️ 超管登录</h2>
          <p class="hint">输入管理员令牌以访问超管视图</p>
          <input type="password" id="admin-token-input" placeholder="管理员令牌" autocomplete="off">
          <button id="admin-verify-btn" class="btn btn-admin">进入超管</button>
          <div id="admin-auth-error" class="error-message"></div>
          <div class="admin-entry">
            <button id="admin-back-btn" class="btn-link">← 返回普通登录</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 超管仪表板 -->
    <div id="admin-page" class="page" style="display: none;">
      <div class="header admin-header">
        <h1>🛡️ 超管视图</h1>
        <div class="header-actions">
          <button id="admin-refresh-btn" class="btn btn-secondary btn-sm">⟳ 刷新</button>
          <button id="admin-logout-btn" class="btn btn-secondary">退出超管</button>
        </div>
      </div>
      <div class="card">
        <div class="admin-stats" id="admin-stats"></div>
        <div id="admin-keys-list"></div>
      </div>
    </div>

    <!-- 管理页面 -->
    <div id="manage-page" class="page" style="display: none;">
      <div class="header">
        <h1>📋 SSH 公钥管理</h1>
        <button id="logout-btn" class="btn btn-secondary">退出登录</button>
      </div>

      <!-- 添加公钥 -->
      <div class="card">
        <h2>➕ 添加公钥</h2>
        <textarea id="public-key-input" placeholder="粘贴您的 SSH 公钥（例如：ssh-rsa AAAAB3...）" rows="4"></textarea>
        <input type="text" id="key-comment-input" placeholder="备注（可选）" maxlength="100">
        <div class="port-request-row">
          <label class="toggle-label">
            <input type="checkbox" id="request-port-checkbox">
            <span class="toggle-slider"></span>
            <span class="toggle-text">申请 SSH 隧道端口（用于反向隧道穿透）</span>
          </label>
        </div>
        <button id="add-key-btn" class="btn btn-primary">添加公钥</button>
        <div id="add-error" class="error-message"></div>
        <div id="add-success" class="success-message"></div>
      </div>

      <!-- 公钥列表 -->
      <div class="card">
        <div class="keys-list-header">
          <h2>🔑 我的公钥列表</h2>
          <button id="refresh-status-btn" class="btn btn-secondary btn-sm" title="刷新隧道状态">⟳ 刷新状态</button>
        </div>
        <div id="keys-list"></div>
      </div>

      <!-- NAT 穿透 / TCP·UDP 中继 -->
      <div class="card">
        <div class="keys-list-header">
          <h2>🌐 TCP / UDP 中继</h2>
          <button id="relay-refresh-btn" class="btn btn-secondary btn-sm">⟳ 刷新</button>
        </div>
        <p class="hint" style="margin-bottom:12px;">通过轻量中继客户端（非 SSH）穿透 TCP 或 UDP 端口，适用于 SSH 隧道无法覆盖的 UDP 协议场景。</p>

        <!-- 创建中继客户端 -->
        <div class="relay-create-row">
          <input type="text" id="relay-client-name" placeholder="客户端名称（可选）" style="flex:1;margin-bottom:0;">
          <button id="relay-create-client-btn" class="btn btn-primary btn-sm">＋ 创建客户端</button>
        </div>
        <div id="relay-clients-list" style="margin-top:12px;"></div>

        <!-- 转发规则列表 -->
        <div style="margin-top:16px;">
          <h3 style="color:#444;font-size:15px;margin-bottom:8px;">📋 转发规则</h3>
          <div id="relay-rules-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 加载 FingerprintJS（本地版本，避免被广告拦截器阻止） -->
  <script src="fp.min.js"></script>
  <script src="app.js"></script>

  <!-- SSH 隧道配置指南 Modal -->
  <div id="tunnel-guide-modal" class="modal-overlay" style="display:none;" onclick="closeTunnelGuide(event)">
    <div class="modal-box" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2>🛡️ SSH 隧道配置指南</h2>
        <button class="modal-close" onclick="closeTunnelGuide()">&times;</button>
      </div>
      <div class="modal-body" id="tunnel-guide-content"></div>
    </div>
  </div>
</body>
</html>
